name: Build BOUH GOLD PRO ULTRA APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Clean Flutter project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/bouh-gold-pro-ultra-v12.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bouh-gold-pro-ultra-v12-apk
          path: dist/bouh-gold-pro-ultra-v12.apk
          retention-days: 30
